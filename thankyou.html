<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 24px;
        }

        .thankyou-card {
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 36px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
        }

        .thankyou-card h1 {
            margin: 0 0 18px;
            font-size: 2.25rem;
        }

        .thankyou-card p {
            margin: 0 0 24px;
            color: #dcdcdc;
            line-height: 1.6;
            font-size: 1rem;
        }

        .thankyou-card a {
            display: inline-block;
            color: #000;
            background: #fff;
            padding: 14px 28px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="thankyou-card">
        <h1>Thank You!</h1>
        <p>Your request has been received. Our team will contact you shortly with details and next steps.</p>
        <a href="index.html">Back to Home</a>
    </div>
</body>

</html>
